{% extends "base.html" %}
{% block title %}{{ branch.name }} — Lighthouse Church{% endblock %}
{% block content %}

<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; text-align:center; gap:0;">
  <div class="animate-in" style="margin-bottom:32px;">
    <div style="width:80px; height:80px; background:var(--green-pale); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; font-size:2.5rem;">{{ branch.icon }}</div>
    <h1 style="margin-bottom:8px;">{{ branch.name }}</h1>
    {% if branch.description %}
      <p style="font-size:1rem; max-width:280px; margin:0 auto;">{{ branch.description }}</p>
    {% endif %}
  </div>

  <div class="animate-in delay-1" style="width:100%; max-width:360px; display:flex; flex-direction:column; gap:12px;">
    <a href="{% url 'branch_family_login' branch.slug %}" class="btn btn-primary" style="font-size:1.1rem; min-height:60px;">
      <span>🏠</span> Family Login
    </a>
    <a href="{% url 'branch_kiosk_login' branch.slug %}" class="btn btn-secondary">
      <span>🖥️</span> Kiosk Login
    </a>
  </div>

  <div class="animate-in delay-2" style="margin-top:24px;">
    <a href="{% url 'home' %}" class="text-muted" style="text-decoration:none; font-size:0.875rem;">← All programmes</a>
  </div>
</div>

{% endblock %}
