{% extends "base.html" %}
{% block title %}Expired — Church Meals{% endblock %}
{% block content %}
<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;">
  <div class="animate-in">
    <div style="font-size:4rem; margin-bottom:16px;">⏱️</div>
    <h1>Code Expired</h1>
    <p>This QR code has expired. Please generate a new one.</p>
  </div>
  <div class="animate-in delay-1 mt-24" style="width:100%;">
    <a href="{% url 'meals:user_summary' %}" class="btn btn-primary">Generate New Code</a>
  </div>
</div>
{% endblock %}
