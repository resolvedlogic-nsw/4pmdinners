{% extends "base.html" %}
{% block title %}Change PIN — Church Meals{% endblock %}
{% block header_nav %}
  <a href="{% url 'meals:user_summary' %}" class="nav-link">← Back</a>
{% endblock %}
{% block content %}
<div class="animate-in">
  <h1>Change PIN</h1>
  <p>Choose a 4–6 digit PIN you'll remember.</p>
</div>

<form method="post">
  {% csrf_token %}
  {% if error %}<div class="alert alert-danger animate-in">✕ {{ error }}</div>{% endif %}

  <div class="card animate-in delay-1">
    <div class="form-group">
      <label for="current_pin">Current PIN</label>
      <input type="tel" name="current_pin" id="current_pin" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label for="new_pin">New PIN</label>
      <input type="tel" name="new_pin" id="new_pin" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="new-password">
    </div>
    <div class="form-group mb-0">
      <label for="confirm_pin">Confirm New PIN</label>
      <input type="tel" name="confirm_pin" id="confirm_pin" class="pin-input" maxlength="6" inputmode="numeric" placeholder="••••" autocomplete="new-password">
    </div>
  </div>

  <div class="animate-in delay-2">
    <button type="submit" class="btn btn-primary">Update PIN</button>
  </div>
</form>
{% endblock %}
